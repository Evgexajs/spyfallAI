<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpyfallAI - Просмотр игры</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: #16213e;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0f3460;
        }

        .header h1 {
            font-size: 1.5rem;
            color: #e94560;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-info .game-id {
            font-family: 'Courier New', monospace;
            color: #888;
            font-size: 0.85rem;
        }

        .outcome-badge {
            padding: 4px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .outcome-badge.spy {
            background-color: #ef4444;
            color: white;
        }

        .outcome-badge.civilians {
            background-color: #4ade80;
            color: black;
        }

        .outcome-badge.cancelled {
            background-color: #666;
            color: white;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            background-color: #0f0f23;
            border-radius: 8px;
            padding: 1rem;
        }

        .message {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            background-color: #1a1a2e;
            border-left: 4px solid #666;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .speaker-name {
            font-weight: bold;
        }

        .message-type {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            background-color: #333;
            color: #aaa;
        }

        .message-type.question { background-color: #3b82f6; color: white; }
        .message-type.answer { background-color: #10b981; color: white; }
        .message-type.intervention { background-color: #f59e0b; color: black; }
        .message-type.vote { background-color: #8b5cf6; color: white; }
        .message-type.spy_guess { background-color: #ef4444; color: white; }
        .message-type.spy_leak { background-color: #dc2626; color: white; }

        .message-content {
            line-height: 1.5;
        }

        .message.intervention {
            font-style: italic;
            margin-left: 1rem;
            border-left-color: #f59e0b;
            background-color: rgba(245, 158, 11, 0.1);
        }

        .message.vote {
            background-color: rgba(139, 92, 246, 0.15);
            border-left-color: #8b5cf6;
            border: 2px solid #8b5cf6;
            border-left-width: 6px;
        }

        .message.vote .message-content {
            font-weight: 500;
        }

        .message.spy_guess {
            background-color: rgba(239, 68, 68, 0.15);
            border-left-color: #ef4444;
            border: 2px solid #ef4444;
            border-left-width: 6px;
        }

        .message.spy_leak {
            background-color: rgba(220, 38, 38, 0.2);
            border-left-color: #dc2626;
            border: 2px dashed #dc2626;
            border-left-width: 6px;
        }

        .message-addressee {
            color: #888;
            font-size: 0.85rem;
        }

        .message-turn-number {
            color: #555;
            font-size: 0.75rem;
            margin-left: auto;
        }

        .system-message {
            text-align: center;
            padding: 0.5rem;
            margin: 0.5rem 0;
            color: #888;
            font-style: italic;
            background-color: transparent;
            border-left: none;
        }

        .system-message.phase {
            color: #e94560;
            font-weight: bold;
            font-style: normal;
        }

        .system-message.outcome {
            color: #4ade80;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .sidebar {
            width: 320px;
            background-color: #16213e;
            padding: 1rem;
            border-left: 2px solid #0f3460;
            overflow-y: auto;
        }

        .sidebar h3 {
            color: #e94560;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #0f3460;
        }

        .player-list {
            list-style: none;
        }

        .player-item {
            padding: 0.5rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            background-color: #1a1a2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-name {
            font-weight: bold;
        }

        .player-role {
            font-size: 0.8rem;
            color: #888;
        }

        .player-item.spy {
            border: 1px solid #ef4444;
        }

        .game-info {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #0f3460;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-label {
            color: #888;
        }

        .info-value {
            font-weight: 500;
        }

        .stats-section {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #0f3460;
        }

        .stats-section h4 {
            color: #e94560;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
        }

        .stat-label {
            color: #888;
        }

        .stat-value {
            color: #4ade80;
            font-family: 'Courier New', monospace;
        }

        .stat-value.cost {
            color: #f59e0b;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: #888;
        }

        .error {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: #ef4444;
            flex-direction: column;
            gap: 1rem;
        }

        .back-link {
            color: #6366f1;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-left: none;
                border-top: 2px solid #0f3460;
                max-height: 300px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div>
            <h1>SpyfallAI</h1>
            <a href="/" class="back-link">← Вернуться к игре</a>
        </div>
        <div class="header-info">
            <span class="game-id" id="gameId"></span>
            <span class="outcome-badge" id="outcomeBadge"></span>
        </div>
    </header>

    <main class="main-container">
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="loading" id="loadingIndicator">Загрузка игры...</div>
                <div class="error" id="errorIndicator" style="display: none;">
                    <span>Ошибка загрузки игры</span>
                    <a href="/" class="back-link">Вернуться на главную</a>
                </div>
            </div>
        </div>

        <aside class="sidebar" id="sidebar" style="display: none;">
            <h3>Игроки</h3>
            <ul class="player-list" id="playerList"></ul>

            <div class="game-info">
                <div class="info-row">
                    <span class="info-label">Локация:</span>
                    <span class="info-value" id="infoLocation">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Начало:</span>
                    <span class="info-value" id="infoStarted">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Окончание:</span>
                    <span class="info-value" id="infoEnded">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Длительность:</span>
                    <span class="info-value" id="infoDuration">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Ходов:</span>
                    <span class="info-value" id="infoTurns">-</span>
                </div>
            </div>

            <div class="stats-section" id="statsSection">
                <h4>Статистика</h4>
                <div class="stat-row">
                    <span class="stat-label">Входные токены:</span>
                    <span class="stat-value" id="statInputTokens">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Выходные токены:</span>
                    <span class="stat-value" id="statOutputTokens">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">LLM вызовов:</span>
                    <span class="stat-value" id="statLlmCalls">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Стоимость:</span>
                    <span class="stat-value cost" id="statCost">-</span>
                </div>
            </div>
        </aside>
    </main>

    <script>
        const TURN_TYPE_LABELS = {
            question: 'Q',
            answer: 'A',
            intervention: 'INT',
            vote: 'VOTE',
            spy_guess: 'GUESS',
            spy_leak: 'LEAK'
        };

        const PLAYER_COLORS = [
            '#e94560', '#4ade80', '#3b82f6', '#f59e0b',
            '#8b5cf6', '#ec4899', '#14b8a6', '#f97316'
        ];

        let gameData = null;
        let playerColorMap = {};

        function getGameIdFromUrl() {
            const pathParts = window.location.pathname.split('/');
            return pathParts[pathParts.length - 1];
        }

        function getPlayerColor(playerId) {
            const player = gameData.players.find(p => p.character_id === playerId);
            if (player && player.color) {
                return player.color;
            }
            if (!playerColorMap[playerId]) {
                const index = Object.keys(playerColorMap).length % PLAYER_COLORS.length;
                playerColorMap[playerId] = PLAYER_COLORS[index];
            }
            return playerColorMap[playerId];
        }

        function getPlayerName(playerId) {
            const player = gameData.players.find(p => p.character_id === playerId);
            if (player && player.display_name) {
                return player.display_name;
            }
            return player ? player.character_id.replace(/_/g, ' ') : playerId;
        }

        function formatDateTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU');
        }

        function formatDuration(startedAt, endedAt) {
            if (!startedAt || !endedAt) return '-';
            const start = new Date(startedAt);
            const end = new Date(endedAt);
            const durationMs = end - start;
            const minutes = Math.floor(durationMs / 60000);
            const seconds = Math.floor((durationMs % 60000) / 1000);
            return `${minutes}м ${seconds}с`;
        }

        function addMessage(turn) {
            const chatMessages = document.getElementById('chatMessages');

            const msg = document.createElement('div');
            msg.className = 'message';

            const turnType = turn.type.toLowerCase();
            const styledTypes = ['intervention', 'vote', 'spy_guess', 'spy_leak'];
            if (styledTypes.includes(turnType)) {
                msg.classList.add(turnType);
            }

            const color = getPlayerColor(turn.speaker_id);
            msg.style.borderLeftColor = color;

            const header = document.createElement('div');
            header.className = 'message-header';

            const speaker = document.createElement('span');
            speaker.className = 'speaker-name';
            speaker.style.color = color;
            speaker.textContent = getPlayerName(turn.speaker_id);

            const typeLabel = document.createElement('span');
            typeLabel.className = 'message-type ' + turnType;
            typeLabel.textContent = TURN_TYPE_LABELS[turnType] || turnType.toUpperCase();

            header.appendChild(speaker);

            if (turn.addressee_id && turn.addressee_id !== 'all') {
                const addressee = document.createElement('span');
                addressee.className = 'message-addressee';
                addressee.textContent = ' → ' + getPlayerName(turn.addressee_id);
                header.appendChild(addressee);
            }

            header.appendChild(typeLabel);

            const turnNumber = document.createElement('span');
            turnNumber.className = 'message-turn-number';
            turnNumber.textContent = '#' + turn.turn_number;
            header.appendChild(turnNumber);

            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = turn.content;

            msg.appendChild(header);
            msg.appendChild(content);

            chatMessages.appendChild(msg);
        }

        function addSystemMessage(text, className = '') {
            const chatMessages = document.getElementById('chatMessages');
            const msg = document.createElement('div');
            msg.className = 'system-message ' + className;
            msg.textContent = text;
            chatMessages.appendChild(msg);
        }

        function renderGame() {
            const chatMessages = document.getElementById('chatMessages');
            chatMessages.innerHTML = '';

            document.getElementById('gameId').textContent = gameData.id;

            const outcomeBadge = document.getElementById('outcomeBadge');
            if (gameData.outcome) {
                const winner = gameData.outcome.winner;
                if (winner === 'spy') {
                    outcomeBadge.textContent = 'Победа шпиона';
                    outcomeBadge.className = 'outcome-badge spy';
                } else if (winner === 'civilians') {
                    outcomeBadge.textContent = 'Победа мирных';
                    outcomeBadge.className = 'outcome-badge civilians';
                } else if (winner === 'cancelled') {
                    outcomeBadge.textContent = 'Отменена';
                    outcomeBadge.className = 'outcome-badge cancelled';
                } else {
                    outcomeBadge.textContent = winner || '-';
                    outcomeBadge.className = 'outcome-badge';
                }
            }

            document.title = `SpyfallAI - ${gameData.location_id || 'Игра'}`;

            const playerList = document.getElementById('playerList');
            playerList.innerHTML = '';
            gameData.players.forEach(player => {
                const li = document.createElement('li');
                li.className = 'player-item';
                if (player.is_spy) li.classList.add('spy');

                const nameSpan = document.createElement('span');
                nameSpan.className = 'player-name';
                nameSpan.style.color = getPlayerColor(player.character_id);
                nameSpan.textContent = getPlayerName(player.character_id);

                const roleSpan = document.createElement('span');
                roleSpan.className = 'player-role';
                roleSpan.textContent = player.is_spy ? 'ШПИОН' : (player.role_id || '');

                li.appendChild(nameSpan);
                li.appendChild(roleSpan);
                playerList.appendChild(li);
            });

            document.getElementById('infoLocation').textContent = gameData.location_id || '-';
            document.getElementById('infoStarted').textContent = formatDateTime(gameData.started_at);
            document.getElementById('infoEnded').textContent = formatDateTime(gameData.ended_at);
            document.getElementById('infoDuration').textContent = formatDuration(gameData.started_at, gameData.ended_at);
            document.getElementById('infoTurns').textContent = gameData.turns ? gameData.turns.length : 0;

            if (gameData.token_usage) {
                const usage = gameData.token_usage;
                document.getElementById('statInputTokens').textContent = usage.total_input_tokens?.toLocaleString() || '-';
                document.getElementById('statOutputTokens').textContent = usage.total_output_tokens?.toLocaleString() || '-';
                document.getElementById('statLlmCalls').textContent = usage.llm_calls_count || '-';
                document.getElementById('statCost').textContent = usage.total_cost_usd
                    ? '$' + usage.total_cost_usd.toFixed(4)
                    : '-';
            }

            addSystemMessage('Игра началась', 'phase');

            let currentPhase = null;
            if (gameData.turns) {
                gameData.turns.forEach(turn => {
                    addMessage(turn);
                });
            }

            if (gameData.outcome) {
                let outcomeText = '';
                if (gameData.outcome.winner === 'spy') {
                    outcomeText = 'Победа шпиона!';
                    if (gameData.outcome.reason) {
                        outcomeText += ' (' + gameData.outcome.reason + ')';
                    }
                } else if (gameData.outcome.winner === 'civilians') {
                    outcomeText = 'Победа мирных!';
                    if (gameData.outcome.reason) {
                        outcomeText += ' (' + gameData.outcome.reason + ')';
                    }
                } else if (gameData.outcome.winner === 'cancelled') {
                    outcomeText = 'Игра отменена';
                }
                if (outcomeText) {
                    addSystemMessage(outcomeText, 'outcome');
                }
            }

            document.getElementById('sidebar').style.display = 'block';
        }

        async function loadGame() {
            const gameId = getGameIdFromUrl();
            if (!gameId) {
                showError('ID игры не указан');
                return;
            }

            try {
                const response = await fetch('/games/' + gameId);
                if (!response.ok) {
                    if (response.status === 404) {
                        showError('Игра не найдена');
                    } else {
                        showError('Ошибка сервера: ' + response.status);
                    }
                    return;
                }

                gameData = await response.json();
                document.getElementById('loadingIndicator').style.display = 'none';
                renderGame();

            } catch (error) {
                showError('Ошибка загрузки: ' + error.message);
            }
        }

        function showError(message) {
            document.getElementById('loadingIndicator').style.display = 'none';
            const errorIndicator = document.getElementById('errorIndicator');
            errorIndicator.querySelector('span').textContent = message;
            errorIndicator.style.display = 'flex';
        }

        document.addEventListener('DOMContentLoaded', loadGame);
    </script>
</body>
</html>
