<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spyfall Visualizer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --color-bg-primary: #1a1a2e;
        --color-bg-secondary: #252540;
        --color-bg-tertiary: #2f2f4a;
        --color-accent: #4a6fa5;
        --color-accent-hover: #5a8fc5;
        --color-accent-active: #3a5f95;
        --color-success: #28a745;
        --color-danger: #dc3545;
        --color-warning: #ffc107;
        --color-text-primary: #e0e0e0;
        --color-text-secondary: #aaa;
        --color-text-muted: #666;
        --color-border: #3a3a5a;
        --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.2);
        --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
        --transition-fast: 0.15s ease;
        --transition-normal: 0.25s ease;
        --radius-sm: 4px;
        --radius-md: 6px;
        --radius-lg: 8px;
      }

      body {
        background-color: var(--color-bg-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: var(--color-text-primary);
        padding: 20px;
        gap: 16px;
      }

      .visualizer-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      #app {
        width: 1920px;
        height: 1080px;
        background-color: #000;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
      }

      .controls-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        width: 100%;
        max-width: 1920px;
        padding: 20px 28px;
        background: linear-gradient(to bottom, var(--color-bg-secondary), #222238);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        border: 1px solid var(--color-border);
      }

      .controls-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        width: 100%;
        flex-wrap: wrap;
      }

      .control-group {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 16px;
        background-color: rgba(0, 0, 0, 0.15);
        border-radius: var(--radius-md);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .control-group-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--color-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }

      #file-selector {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #file-input {
        display: none;
      }

      #file-name {
        font-size: 13px;
        color: var(--color-text-secondary);
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding: 4px 8px;
        background-color: rgba(0, 0, 0, 0.2);
        border-radius: var(--radius-sm);
      }

      #playback-controls {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #speed-controls {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #progress-indicator {
        display: flex;
        align-items: center;
        gap: 16px;
        min-width: 400px;
        padding: 8px 16px;
        background-color: rgba(0, 0, 0, 0.15);
        border-radius: var(--radius-md);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      #progress-bar-container {
        flex: 1;
        height: 6px;
        background-color: var(--color-bg-primary);
        border-radius: 3px;
        overflow: hidden;
        box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
      }

      #progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--color-accent), var(--color-accent-hover));
        border-radius: 3px;
        transition: width var(--transition-normal);
        box-shadow: 0 0 8px rgba(74, 111, 165, 0.5);
      }

      #progress-text {
        font-size: 13px;
        font-weight: 500;
        color: var(--color-text-secondary);
        min-width: 70px;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      #error-display {
        display: none;
        width: 100%;
        padding: 14px 18px;
        background-color: rgba(220, 53, 69, 0.12);
        border: 1px solid rgba(220, 53, 69, 0.4);
        border-radius: var(--radius-md);
        color: #ff7b7b;
        font-size: 14px;
        line-height: 1.5;
        animation: slideIn var(--transition-normal);
      }

      #error-display.visible {
        display: block;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      #loading-indicator {
        display: none;
        align-items: center;
        gap: 10px;
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 500;
        color: var(--color-accent-hover);
        background-color: rgba(74, 111, 165, 0.1);
        border-radius: var(--radius-md);
        border: 1px solid rgba(74, 111, 165, 0.2);
      }

      #loading-indicator.visible {
        display: flex;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--color-accent);
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 18px;
        font-size: 13px;
        font-weight: 600;
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all var(--transition-fast);
        background-color: var(--color-accent);
        color: #fff;
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
        box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: hidden;
      }

      button::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(to bottom, rgba(255, 255, 255, 0.08), transparent);
        pointer-events: none;
      }

      button:hover:not(:disabled) {
        background-color: var(--color-accent-hover);
        transform: translateY(-1px);
        box-shadow: var(--shadow-md), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      }

      button:active:not(:disabled) {
        background-color: var(--color-accent-active);
        transform: translateY(0);
        box-shadow: var(--shadow-sm), inset 0 2px 4px rgba(0, 0, 0, 0.2);
      }

      button:focus-visible {
        outline: none;
        box-shadow: var(--shadow-sm), 0 0 0 3px rgba(74, 111, 165, 0.4);
      }

      button:disabled {
        background-color: var(--color-border);
        color: var(--color-text-muted);
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
        text-shadow: none;
        opacity: 0.7;
      }

      button:disabled::before {
        display: none;
      }

      button.secondary {
        background-color: var(--color-bg-tertiary);
        color: var(--color-text-secondary);
        box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      button.secondary:hover:not(:disabled) {
        background-color: #3a3a5a;
        color: var(--color-text-primary);
      }

      button.secondary:active:not(:disabled) {
        background-color: var(--color-bg-secondary);
      }

      button.active {
        background-color: var(--color-accent-hover);
        box-shadow: var(--shadow-sm), 0 0 0 2px rgba(90, 143, 197, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      button.speed-btn {
        padding: 8px 14px;
        font-size: 12px;
        min-width: 52px;
        background-color: var(--color-bg-tertiary);
        color: var(--color-text-secondary);
      }

      button.speed-btn:hover:not(:disabled):not(.active) {
        background-color: #3a3a5a;
        color: var(--color-text-primary);
      }

      button.speed-btn.active {
        background-color: var(--color-accent);
        color: #fff;
        box-shadow: var(--shadow-sm), 0 0 0 2px rgba(74, 111, 165, 0.4);
      }

      .btn-icon {
        font-size: 14px;
        line-height: 1;
      }

      #play-button .btn-icon::before { content: '▶'; }
      #pause-button .btn-icon::before { content: '⏸'; }
      #restart-button .btn-icon::before { content: '↺'; font-size: 16px; }
      #file-button .btn-icon::before { content: '📂'; }

      @media (max-width: 1960px) {
        .visualizer-container {
          transform-origin: top center;
          transform: scale(0.9);
        }
      }

      @media (max-width: 1760px) {
        .visualizer-container {
          transform: scale(0.8);
        }
      }

      @media (max-width: 1560px) {
        .visualizer-container {
          transform: scale(0.7);
        }
      }

      @media (max-width: 1360px) {
        .visualizer-container {
          transform: scale(0.6);
        }
      }
    </style>
  </head>
  <body>
    <div class="visualizer-container">
      <div id="app"></div>

      <div class="controls-panel">
        <div id="error-display"></div>

        <div class="controls-row">
          <div class="control-group" id="file-selector">
            <button id="file-button" class="secondary"><span class="btn-icon"></span>Выбрать файл</button>
            <input type="file" id="file-input" accept=".json" />
            <span id="file-name">Файл не выбран</span>
          </div>

          <div id="loading-indicator">
            <div class="spinner"></div>
            <span>Загрузка ассетов...</span>
          </div>

          <div class="control-group" id="playback-controls">
            <button id="play-button" disabled><span class="btn-icon"></span>Play</button>
            <button id="pause-button" disabled><span class="btn-icon"></span>Pause</button>
            <button id="restart-button" disabled><span class="btn-icon"></span>Restart</button>
          </div>

          <div class="control-group" id="speed-controls">
            <span class="control-group-label">Скорость:</span>
            <button class="speed-btn" data-speed="0.5">x0.5</button>
            <button class="speed-btn active" data-speed="1">x1</button>
            <button class="speed-btn" data-speed="2">x2</button>
          </div>
        </div>

        <div class="controls-row">
          <div id="progress-indicator">
            <div id="progress-bar-container">
              <div id="progress-bar"></div>
            </div>
            <span id="progress-text">0 / 0</span>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
